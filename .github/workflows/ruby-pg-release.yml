name: Publish Ruby pg Connector to RubyGems

permissions: {}

on:
  push:
    tags:
      - "ruby/pg/v*"

defaults:
  run:
    working-directory: ruby/pg

jobs:
  wait-for-ci:
    name: Wait for CI to pass
    runs-on: ubuntu-latest
    steps:
      - uses: lewagon/wait-on-check-action@9312864dfbc9fd208e9c0417843430751c042800 # v1.7.0
        with:
          ref: ${{ github.sha }}
          running-workflow-name: "Wait for CI to pass"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30
          check-regexp: "build \\(3\\."

  publish:
    needs: wait-for-ci
    runs-on: ubuntu-latest
    environment: ruby
    permissions:
      id-token: write # required for requesting the JWT
      contents: read # required for actions/checkout
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@6aaa311d81eba98ae12eaffbcb63296ace0efcde # v1
        with:
          ruby-version: "3.3"
          working-directory: ruby/pg

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6
        with:
          role-to-assume: ${{ secrets.RUBYGEMS_PUBLISH_IAM_ROLE }}
          role-session-name: ruby-pg-rubygems-publish
          aws-region: us-east-1

      - name: Get RubyGems API Key
        run: |
          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id "prod/rubygems/account-credentials" \
            --query 'SecretString' \
            --output text)
          RUBYGEMS_API_KEY=$(echo "$SECRET_JSON" | jq -r '.["API Key for Github Publish"]')
          echo "::add-mask::$RUBYGEMS_API_KEY"
          echo "GEM_HOST_API_KEY=$RUBYGEMS_API_KEY" >> "$GITHUB_ENV"

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#ruby/pg/v}"
          echo "Publishing version $VERSION"
          sed -i "s/VERSION = .*/VERSION = \"$VERSION\"/" lib/aurora_dsql/pg/version.rb

      - name: Build gem
        run: gem build aurora-dsql-ruby-pg.gemspec

      - name: Publish to RubyGems
        run: gem push aurora-dsql-ruby-pg-*.gem

  update-changelog:
    needs: publish
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/update-changelog.yml
    with:
      tag: ${{ github.ref_name }}
    secrets: inherit
